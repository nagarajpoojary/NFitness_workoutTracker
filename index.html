<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>N Workout Tracker Pro v5.2 Ultimate</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin:10px 0}
button,input,select{padding:10px;margin:4px;border-radius:8px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #334155;padding:8px}
.progress{background:#334155;height:20px;border-radius:10px}
.bar{background:#22c55e;height:20px;width:0%;border-radius:10px}
</style>
</head>
<body>
<h1>🏋️ N Workout Tracker Pro v5.2 Ultimate</h1>

<div class="card"><h3>📅 Live Date & Time</h3><div id="clock"></div></div>

<div class="card">
<h3>⏱ Workout Timer</h3>
<div id="timer">00:00:00</div>
<button onclick="startWorkout()">Start</button>
<button onclick="pauseWorkout()">Pause</button>
<button onclick="resumeWorkout()">Resume</button>
<button onclick="endWorkout()">End</button>
</div>

<div class="card">
<h3>📋 Workout Template</h3>
<select id="template" onchange="loadTemplate()">
<option>Custom</option>
<option>Back + Triceps</option>
<option>Chest + Biceps</option>
<option>Legs</option>
</select>
</div>

<div class="card">
<h3>📸 Upload Workout Poster/Image</h3>
<input type="file" id="img" accept="image/*">
<img id="preview" style="max-width:250px;display:none">
<p>OCR-ready placeholder.</p>
</div>

<div class="card">
<h3>🏋️ Set Tracker</h3>
<input id="exercise" placeholder="Exercise">
<input id="setno" placeholder="Set Number">
<input id="weight" placeholder="Weight (kg)">
<input id="reps" placeholder="Reps">
<button onclick="addSet()">Add Set</button>
<table>
<thead><tr><th>Exercise</th><th>Set</th><th>Weight</th><th>Reps</th></tr></thead>
<tbody id="tbl"></tbody>
</table>
</div>

<div class="card">
<h3>⏳ Rest Countdown + Alarm</h3>
<label><input type="checkbox" id="autoStart"> Auto Start Next Set</label><br>
<button onclick="startRest(30)">30s</button>
<button onclick="startRest(45)">45s</button>
<button onclick="startRest(60)">60s</button>
<button onclick="startRest(90)">90s</button>
<div id="rest">Ready</div>
</div>

<div class="card">
<h3>💧 Water Tracker</h3>
<button onclick="water++;updateWater()">+1 Glass</button>
<div id="water"></div>
</div>

<div class="card">
<h3>📈 Progress & PR</h3>
<div class="progress"><div id="bar" class="bar"></div></div>
<div id="progressText">0%</div>
<div id="pr">Best Weight: 0 kg</div>
</div>

<script>
function speak(t){if(window.speechSynthesis){speechSynthesis.speak(new SpeechSynthesisUtterance(t));}}

function updateClock(){clock.innerText=new Date().toLocaleString();}
setInterval(updateClock,1000);updateClock();

let start=0,elapsed=0,intv=null;
function startWorkout(){start=Date.now();clearInterval(intv);intv=setInterval(updateTimer,1000);speak("Workout Started");}
function pauseWorkout(){elapsed+=Date.now()-start;clearInterval(intv);speak("Workout Paused");}
function resumeWorkout(){start=Date.now();intv=setInterval(updateTimer,1000);speak("Workout Resumed");}
function endWorkout(){clearInterval(intv);speak("Workout Completed");}
function updateTimer(){
 let ms=elapsed+(Date.now()-start);
 let s=Math.floor(ms/1000);
 timer.innerText=String(Math.floor(s/3600)).padStart(2,'0')+":"
 +String(Math.floor((s%3600)/60)).padStart(2,'0')+":"
 +String(s%60).padStart(2,'0');
}

const templates={
"Back + Triceps":["Lat Pulldown","Seated Cable Row","DB Row","Straight Arm Pulldown","Rope Pushdown"],
"Chest + Biceps":["Bench Press","Incline Press","Barbell Curl"],
"Legs":["Squat","Leg Press","Leg Curl"]
};
function loadTemplate(){
 let t=document.getElementById("template").value;
 if(templates[t]) alert("Loaded: "+templates[t].join(", "));
}

let count=0;
function addSet(){
 tbl.innerHTML += `<tr><td>${exercise.value}</td><td>${setno.value}</td><td>${weight.value}</td><td>${reps.value}</td></tr>`;
 localStorage.setItem("sets52",tbl.innerHTML);
 count++;
 let p=Math.min(count*10,100);
 bar.style.width=p+"%";
 progressText.innerText=p+"% Complete";
 let best=Number(localStorage.getItem("pr52")||0);
 if(Number(weight.value)>best){
   localStorage.setItem("pr52",weight.value);
   pr.innerText="Best Weight: "+weight.value+" kg";
 }
}
tbl.innerHTML=localStorage.getItem("sets52")||"";
pr.innerText="Best Weight: "+(localStorage.getItem("pr52")||0)+" kg";

function startRest(sec){
 let t=sec;
 speak("Rest Started");
 let auto=document.getElementById("autoStart").checked;

 let x=setInterval(function(){
   rest.innerText="Remaining: "+t+" sec";
   t--;
   if(t<0){
      clearInterval(x);
      rest.innerText="🔥 START NEXT SET";

      try{
       let audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
       audio.play();
      }catch(e){}

      if(navigator.vibrate){navigator.vibrate([500,300,500]);}
      speak("Rest complete. Start next set");

      if(auto){
         speak("Starting next set");
      }
   }
 },1000);
}

let water=0;
function updateWater(){document.getElementById("water").innerText="Glasses: "+water;}
updateWater();

img.addEventListener("change",function(e){
 let f=e.target.files[0];
 if(f){preview.src=URL.createObjectURL(f);preview.style.display="block";}
});
</script>
</body>
</html>
