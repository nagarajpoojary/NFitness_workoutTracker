<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>N Workout Tracker Pro v3.0</title>
<style>
body{font-family:Arial;background:#0b0f14;color:white;margin:0;padding:15px}
.card{background:#161b22;border-radius:12px;padding:15px;margin:10px 0}
button{padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
input,select{padding:8px;width:100%;margin:5px 0}
.progress{width:100%;background:#333;border-radius:10px}
.bar{height:20px;background:#4caf50;width:0%;border-radius:10px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #444;padding:8px}
</style>
</head>
<body>
<h1>🏆 N Workout Tracker Pro v3.0 Premium</h1>

<div class="card">
<h3>📅 Date & Time</h3>
<div id="clock"></div>
</div>

<div class="card">
<h3>⏱ Workout Session</h3>
<div id="timer">00:00:00</div>
<button onclick="startWorkout()">Start</button>
<button onclick="stopWorkout()">Stop</button>
</div>

<div class="card">
<h3>📸 Workout Image Upload</h3>
<input type="file" accept="image/*" id="img">
<p>Ready for OCR integration (Tesseract.js when hosted online).</p>
<img id="preview" style="max-width:300px;display:none">
</div>

<div class="card">
<h3>🏋️ Exercise Tracker</h3>
<input id="ex" placeholder="Exercise Name">
<input id="sets" placeholder="Sets">
<input id="reps" placeholder="Reps">
<input id="wt" placeholder="Weight (kg)">
<button onclick="addExercise()">Add Exercise</button>
<table>
<thead><tr><th>Exercise</th><th>Sets</th><th>Reps</th><th>Weight</th></tr></thead>
<tbody id="tbl"></tbody>
</table>
</div>

<div class="card">
<h3>⏲ Rest Timer</h3>
<input id="rest" value="60">
<button onclick="restTimer()">Start Rest</button>
<div id="restOut"></div>
</div>

<div class="card">
<h3>💧 Water Tracker</h3>
<button onclick="water++ ; update()">+1 Glass</button>
<div id="water"></div>
</div>

<div class="card">
<h3>🔥 Workout Progress</h3>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="prog"></div>
</div>

<div class="card">
<h3>📈 Personal Records</h3>
<div id="pr">No records yet</div>
</div>

<script>
let water=0,total=0;
function update(){
document.getElementById('water').innerText="Glasses: "+water;
}
function clock(){
document.getElementById('clock').innerText=new Date().toLocaleString();
}
setInterval(clock,1000);clock();

let st,intv;
function startWorkout(){
st=Date.now();
speak("Workout started");
intv=setInterval(()=>{
let s=Math.floor((Date.now()-st)/1000);
let h=String(Math.floor(s/3600)).padStart(2,'0');
let m=String(Math.floor((s%3600)/60)).padStart(2,'0');
let sec=String(s%60).padStart(2,'0');
document.getElementById('timer').innerText=`${h}:${m}:${sec}`;
},1000);
}
function stopWorkout(){clearInterval(intv);speak("Workout completed");}

function speak(t){
if(window.speechSynthesis){
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}
}

function addExercise(){
let ex=document.getElementById('ex').value;
let s=document.getElementById('sets').value;
let r=document.getElementById('reps').value;
let w=document.getElementById('wt').value;

let row=`<tr><td>${ex}</td><td>${s}</td><td>${r}</td><td>${w}</td></tr>`;
document.getElementById('tbl').innerHTML+=row;

total++;
let p=Math.min(total*10,100);
document.getElementById('bar').style.width=p+'%';
document.getElementById('prog').innerText=p+"% Complete";

let pr=localStorage.getItem("pr")||0;
if(Number(w)>Number(pr)){
localStorage.setItem("pr",w);
document.getElementById('pr').innerText="🏆 New PR: "+w+" kg";
}

localStorage.setItem("table",document.getElementById('tbl').innerHTML);
}

document.getElementById('tbl').innerHTML=localStorage.getItem("table")||"";
document.getElementById('pr').innerText="🏆 Best Weight: "+(localStorage.getItem("pr")||0)+" kg";

function restTimer(){
let t=parseInt(document.getElementById('rest').value);
let x=setInterval(()=>{
document.getElementById('restOut').innerText=t+" sec";
t--;
if(t<0){clearInterval(x);document.getElementById('restOut').innerText="Start Next Set";speak("Rest complete");}
},1000);
}

document.getElementById('img').addEventListener('change',e=>{
let f=e.target.files[0];
if(f){
let p=document.getElementById('preview');
p.src=URL.createObjectURL(f);
p.style.display='block';
}
});
</script>
</body>
</html>
